services:
  nginx-service:
    image: lmscmc_nginx
    ports:
      - "8080:80"
    networks:
      - lms-network
    environment:
      - MOODLE_DB_TYPE=pgsql
      - MOODLE_DB_HOST=db
      - MOODLE_DB_USER=moodle
      - MOODLE_DB_PASSWORD=moodle
      - MOODLE_DB_NAME=moodle
      - MOODLE_URL=http://localhost:8080
  db:
    image: postgres:16-alpine
    networks:
      - lms-network
    environment:
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: moodle
      POSTGRES_DB: moodle
volumes:
  postgres_data:
    driver: local
  moodledata:
    driver: local
networks:
  lms-network:
    driver: bridge
